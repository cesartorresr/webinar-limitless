<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#000}
.frame{width:1200px;height:630px;background:radial-gradient(1000px 700px at 75% 10%,rgba(26,86,168,.35),transparent 60%),linear-gradient(160deg,#040A14,#091C3E 70%,#0D2B5E);position:relative;overflow:hidden;padding:56px 64px;display:flex;flex-direction:column;justify-content:space-between}
.curve{position:absolute;top:-120px;right:-120px;width:520px;height:520px;border:3px solid rgba(232,145,45,.18);border-radius:50%}
.top{display:flex;align-items:center;gap:20px;position:relative;z-index:2}
.top img.hid{height:52px}
.sep{width:2px;height:38px;background:rgba(255,255,255,.22)}
.top img.lm{height:24px;opacity:.9}
.mid{position:relative;z-index:2}
.pill{display:inline-block;background:rgba(232,145,45,.14);border:1px solid rgba(232,145,45,.4);color:#E8912D;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:9px 20px;border-radius:20px;margin-bottom:26px}
h1{color:#fff;font-size:62px;font-weight:800;line-height:1.05;letter-spacing:-1px;max-width:1000px}
h1 em{font-style:normal;color:#D4A843}
.sub{color:rgba(255,255,255,.72);font-size:24px;font-weight:400;margin-top:18px;max-width:880px;line-height:1.4}
.bot{display:flex;align-items:center;gap:26px;position:relative;z-index:2}
.date{background:#E8912D;color:#fff;font-size:22px;font-weight:800;padding:14px 26px;border-radius:10px}
.free{color:#5B9BD5;font-size:20px;font-weight:600}
.hidg{color:rgba(255,255,255,.85);font-size:20px;font-weight:600}
</style></head><body>
<div class="frame">
  <div class="curve"></div>
  <div class="top">
    <img class="hid" src="hid-logo.png" alt="HID">
    <div class="sep"></div>
    <img class="lm" src="limitless-logo.svg" alt="Limitless">
  </div>
  <div class="mid">
    <div class="pill">Webinar Oficial · 13 Ago 2026</div>
    <h1>Blindagem de <em>Identidade Híbrida</em></h1>
    <div class="sub">Convergência crítica diante de ciberataques e falhas de infraestrutura. Um evento oficial com a HID Global.</div>
  </div>
  <div class="bot">
    <div class="date">13/08 · 11h Brasília</div>
    <div class="hidg">HID Global</div>
    <div class="free">Gratuito · com certificado</div>
  </div>
</div>
</body></html>
